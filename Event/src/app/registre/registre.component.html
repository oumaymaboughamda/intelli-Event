<div class="box">
  <h2>Création d'un compte</h2>

  <div class="ligne">
    <div class="champ">
      <label>Nom</label>
      <input type="text" placeholder="Nom">
    </div>
    <div class="champ">
      <label>Prénom</label>
      <input type="text" placeholder="Prénom">
    </div>
  </div>

  <div class="champ">
    <label>Email</label>
    <input type="email" placeholder="Email">
  </div>

  <div class="ligne">
    <div class="champ">
      <label>Mot de passe</label>
      <input type="password" placeholder="Mot de passe">
    </div>
    <div class="champ">
      <label>Confirmation</label>
      <input type="password" placeholder="Confirmez">
    </div>
  </div>

  <div class="ligne">
    <div class="champ">
      <label>Code image</label>
      <input type="text" placeholder="Saisir le code">
    </div>
    <div class="captcha-img">
      <img src="https://via.placeholder.com/120x45?text=SP1V5" alt="Captcha">
    </div>
  </div>

  <div class="check-box">
    <input type="checkbox" id="terms">
    <label for="terms">Accepter les conditions d'utilisation</label>
  </div>

  <button class="btn">S'INSCRIRE</button>

  <p class="bas">Vous avez déjà un compte ? <a routerLink="/login">Se connecter</a></p>
</div>
